# ============================================================================
# pgAdmin Pre-configured Server Connection
# Automatically adds postgres as a server in pgAdmin UI
# So you can connect without manually entering connection details
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: apps
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "PostgreSQL (dev-eks)",
          "Group": "Servers",
          "Host": "postgres.apps.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "appdb",
          "Username": "appuser",
          "SSLMode": "prefer",
          "PassFile": "/pgpass"
        }
      }
    }
