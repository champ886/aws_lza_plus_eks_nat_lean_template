# ============================================================================
# ORCHESTRATOR — full apply pipeline, forward order 1 → 9
# ============================================================================
# Single manual trigger. The chosen action (plan/apply) is passed explicitly
# to every component job via `with: action:` — there is no second trigger
# event, so nothing can be "missed" or misinterpreted downstream.
#
# Destroy is intentionally NOT an option here. Use destroy-pipeline.yml,
# which runs the same components in reverse (9 → 1).
# ============================================================================
name: 🚀 Pipeline (apply)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform across the whole pipeline'
        required: true
        type: choice
        options:
          - plan
          - apply
        default: 'plan'
      debug:
        description: 'Enable debug logging'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  security-vpc:
    name: 1️⃣ Security VPC
    uses: ./.github/workflows/component-1-security-vpc.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  dev-vpc:
    name: 2️⃣ Dev VPC
    needs: security-vpc
    uses: ./.github/workflows/component-2-dev-vpc.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  prod-vpc:
    name: 3️⃣ Prod VPC
    needs: dev-vpc
    uses: ./.github/workflows/component-3-prod-vpc.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  peering:
    name: 4️⃣ VPC Peering
    needs: prod-vpc
    uses: ./.github/workflows/component-4-peering.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  transit-gateway:
    name: 4️⃣b Transit Gateway
    needs: peering
    uses: ./.github/workflows/component-4b-transit-gateway.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  eks-cluster:
    name: 5️⃣a Dev EKS Cluster
    needs: transit-gateway
    uses: ./.github/workflows/component-5a-dev-eks-cluster.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  eks-addons:
    name: 5️⃣b Dev EKS Add-ons
    needs: eks-cluster
    uses: ./.github/workflows/component-5b-dev-eks-addons.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  eks-alb:
    name: 6️⃣ Dev EKS ALB Controller
    needs: eks-addons
    uses: ./.github/workflows/component-6-dev-eks-alb.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  eks-argocd:
    name: 7️⃣ Dev EKS ArgoCD
    needs: eks-alb
    uses: ./.github/workflows/component-7-dev-eks-argocd.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  eks-karpenter:
    name: 8️⃣ Dev EKS Karpenter
    needs: eks-argocd
    uses: ./.github/workflows/component-8-dev-eks-karpenter.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit

  eks-kubecost:
    name: 9️⃣ Dev EKS Kubecost
    needs: eks-karpenter
    uses: ./.github/workflows/component-9-dev-eks-kubecost.yml
    with:
      action: ${{ inputs.action }}
      debug: ${{ inputs.debug }}
    secrets: inherit
